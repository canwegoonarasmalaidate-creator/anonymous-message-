<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Message</title>

  <style>

    body{
      background:#f4f4f4;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:350px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    textarea{
      width:100%;
      height:150px;
      padding:10px;
      border-radius:5px;
      border:1px solid #ccc;
      resize:none;
    }

    button{
      width:100%;
      margin-top:15px;
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

  </style>
</head>

<body>

<div class="box">

  <h2>Send Anonymous Message</h2>

  <form id="messageForm">

    <textarea
      id="message"
      placeholder="Write your message..."
      required
    ></textarea>

    <button type="submit">
      Send
    </button>

  </form>

  <p id="response"></p>

</div>

<script>

document.getElementById("messageForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const message = document.getElementById("message").value;

  const response = await fetch("/send", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body: JSON.stringify({ message })

  });

  const result = await response.text();

  document.getElementById("response").innerText = result;

  document.getElementById("message").value = "";

});

</script>

</body>
</html>
